definitions:
  BoxInfoResponse:
    properties:
      backupError:
        type: string
      backupSnapshot:
        type: string
      backupState:
        $ref: '#/definitions/enums.BackupState'
      daemonVersion:
        type: string
      state:
        $ref: '#/definitions/enums.BoxState'
    type: object
  BuildSnapshotRequestDTO:
    properties:
      context:
        items:
          type: string
        type: array
      dockerfile:
        type: string
      organizationId:
        type: string
      pushToInternalRegistry:
        type: boolean
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        description: Snapshot ID and tag or the build's hash
        type: string
      sourceRegistries:
        items:
          $ref: '#/definitions/RegistryDTO'
        type: array
    required:
      - dockerfile
      - organizationId
    type: object
  CreateBackupDTO:
    properties:
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        type: string
    required:
      - registry
      - snapshot
    type: object
  CreateBoxDTO:
    properties:
      authToken:
        type: string
      cpuQuota:
        minimum: 1
        type: integer
      entrypoint:
        items:
          type: string
        type: array
      env:
        additionalProperties:
          type: string
        type: object
      fromVolumeId:
        type: string
      gpuQuota:
        minimum: 0
        type: integer
      id:
        type: string
      memoryQuota:
        minimum: 1
        type: integer
      metadata:
        additionalProperties:
          type: string
        type: object
      networkAllowList:
        type: string
      networkBlockAll:
        type: boolean
      organizationId:
        description: Nullable for backward compatibility
        type: string
      osUser:
        type: string
      otelEndpoint:
        type: string
      regionId:
        type: string
      registry:
        $ref: '#/definitions/RegistryDTO'
      skipStart:
        type: boolean
      image:
        type: string
      storageQuota:
        minimum: 1
        type: integer
      volumes:
        items:
          $ref: '#/definitions/dto.VolumeDTO'
        type: array
    required:
      - id
      - osUser
      - image
    type: object
  ErrorResponse:
    description: Error response
    properties:
      code:
        example: BAD_REQUEST
        type: string
      message:
        example: Bad request
        type: string
      method:
        example: GET
        type: string
      path:
        example: /api/resource
        type: string
      statusCode:
        example: 400
        type: integer
      timestamp:
        example: '2023-01-01T12:00:00Z'
        type: string
    required:
      - message
      - path
      - statusCode
      - timestamp
    type: object
  InspectSnapshotInRegistryRequest:
    properties:
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        example: nginx:latest
        type: string
    required:
      - snapshot
    type: object
  IsRecoverableDTO:
    properties:
      errorReason:
        type: string
    required:
      - errorReason
    type: object
  IsRecoverableResponse:
    properties:
      recoverable:
        type: boolean
    type: object
  PullSnapshotRequestDTO:
    properties:
      destinationRef:
        type: string
      destinationRegistry:
        $ref: '#/definitions/RegistryDTO'
      newTag:
        type: string
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        type: string
    required:
      - snapshot
    type: object
  RecoverBoxDTO:
    properties:
      backupErrorReason:
        type: string
      cpuQuota:
        minimum: 1
        type: integer
      env:
        additionalProperties:
          type: string
        type: object
      errorReason:
        type: string
      fromVolumeId:
        type: string
      gpuQuota:
        minimum: 0
        type: integer
      memoryQuota:
        minimum: 1
        type: integer
      networkAllowList:
        type: string
      networkBlockAll:
        type: boolean
      osUser:
        type: string
      snapshot:
        type: string
      storageQuota:
        minimum: 1
        type: integer
      volumes:
        items:
          $ref: '#/definitions/dto.VolumeDTO'
        type: array
    required:
      - errorReason
      - osUser
    type: object
  RegistryDTO:
    properties:
      password:
        type: string
      project:
        type: string
      url:
        type: string
      username:
        type: string
    required:
      - url
    type: object
  ResizeBoxDTO:
    properties:
      cpu:
        minimum: 1
        type: integer
      disk:
        minimum: 1
        type: integer
      gpu:
        minimum: 0
        type: integer
      memory:
        minimum: 1
        type: integer
    type: object
  RunnerInfoResponseDTO:
    properties:
      appVersion:
        type: string
      metrics:
        $ref: '#/definitions/RunnerMetrics'
      serviceHealth:
        items:
          $ref: '#/definitions/RunnerServiceInfo'
        type: array
    type: object
  RunnerMetrics:
    properties:
      currentAllocatedCpu:
        type: number
      currentAllocatedDiskGiB:
        type: number
      currentAllocatedMemoryGiB:
        type: number
      currentCpuLoadAverage:
        type: number
      currentCpuUsagePercentage:
        type: number
      currentDiskUsagePercentage:
        type: number
      currentMemoryUsagePercentage:
        type: number
      currentSnapshotCount:
        type: integer
      currentStartedBoxes:
        type: integer
    type: object
  RunnerServiceInfo:
    properties:
      errorReason:
        type: string
      healthy:
        type: boolean
      serviceName:
        type: string
    required:
      - healthy
      - serviceName
    type: object
  SnapshotDigestResponse:
    properties:
      hash:
        example: a7be6198544f09a75b26e6376459b47c5b9972e7351d440e092c4faa9ea064ff
        type: string
      sizeGB:
        example: 0.13
        type: number
    type: object
  SnapshotExistsResponse:
    properties:
      exists:
        example: true
        type: boolean
    type: object
  SnapshotInfoResponse:
    properties:
      cmd:
        example:
          - '["nginx"'
          - '"-g"'
          - '"daemon off;"]'
        items:
          type: string
        type: array
      entrypoint:
        example:
          - '["nginx"'
          - '"-g"'
          - '"daemon off;"]'
        items:
          type: string
        type: array
      hash:
        example: a7be6198544f09a75b26e6376459b47c5b9972e7351d440e092c4faa9ea064ff
        type: string
      name:
        example: nginx:latest
        type: string
      sizeGB:
        example: 0.13
        type: number
    type: object
  StartBoxResponse:
    properties:
      daemonVersion:
        type: string
    type: object
  StopBoxDTO:
    properties:
      force:
        type: boolean
    type: object
  TagImageRequestDTO:
    properties:
      sourceImage:
        type: string
      targetImage:
        type: string
    required:
      - sourceImage
      - targetImage
    type: object
  UpdateNetworkSettingsDTO:
    properties:
      networkAllowList:
        type: string
      networkBlockAll:
        type: boolean
      networkLimitEgress:
        type: boolean
    type: object
  dto.VolumeDTO:
    properties:
      mountPath:
        type: string
      subpath:
        type: string
      volumeId:
        type: string
    type: object
  enums.BackupState:
    enum:
      - NONE
      - PENDING
      - IN_PROGRESS
      - COMPLETED
      - FAILED
    type: string
    x-enum-varnames:
      - BackupStateNone
      - BackupStatePending
      - BackupStateInProgress
      - BackupStateCompleted
      - BackupStateFailed
  enums.BoxState:
    enum:
      - creating
      - restoring
      - destroyed
      - destroying
      - started
      - stopped
      - starting
      - stopping
      - resizing
      - error
      - unknown
      - pulling_snapshot
    type: string
    x-enum-varnames:
      - BoxStateCreating
      - BoxStateRestoring
      - BoxStateDestroyed
      - BoxStateDestroying
      - BoxStateStarted
      - BoxStateStopped
      - BoxStateStarting
      - BoxStateStopping
      - BoxStateResizing
      - BoxStateError
      - BoxStateUnknown
      - BoxStatePullingSnapshot
info:
  contact: {}
  description: BoxLite Runner API
  title: BoxLite Runner API
  version: v0.0.0-dev
paths:
  /:
    get:
      description: Health check
      operationId: HealthCheck
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
  /boxes:
    post:
      description: Create a box
      operationId: Create
      parameters:
        - description: Create box
          in: body
          name: box
          required: true
          schema:
            $ref: '#/definitions/CreateBoxDTO'
      produces:
        - application/json
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/StartBoxResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Create a box
      tags:
        - box
  /boxes/{boxId}:
    get:
      description: Get box info
      operationId: Info
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Box info
          schema:
            $ref: '#/definitions/BoxInfoResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get box info
      tags:
        - box
  /boxes/{boxId}/backup:
    post:
      description: Create box backup
      operationId: CreateBackup
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Create backup
          in: body
          name: box
          required: true
          schema:
            $ref: '#/definitions/CreateBackupDTO'
      produces:
        - application/json
      responses:
        '201':
          description: Backup started
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Create box backup
      tags:
        - box
  /boxes/{boxId}/destroy:
    post:
      description: Destroy box
      operationId: Destroy
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Box destroyed
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Destroy box
      tags:
        - box
  /boxes/{boxId}/is-recoverable:
    post:
      consumes:
        - application/json
      description: Check if the box's error reason indicates a recoverable error
      operationId: IsRecoverable
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Error reason to check
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/IsRecoverableDTO'
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/IsRecoverableResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Check if box error is recoverable
      tags:
        - box
  /boxes/{boxId}/network-settings:
    get:
      description: Get box network settings
      operationId: GetNetworkSettings
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Network settings
          schema:
            $ref: '#/definitions/UpdateNetworkSettingsDTO'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get box network settings
      tags:
        - box
    post:
      description: Update box network settings
      operationId: UpdateNetworkSettings
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Update network settings
          in: body
          name: box
          required: true
          schema:
            $ref: '#/definitions/UpdateNetworkSettingsDTO'
      produces:
        - application/json
      responses:
        '200':
          description: Network settings updated
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Update box network settings
      tags:
        - box
  /boxes/{boxId}/recover:
    post:
      consumes:
        - application/json
      description: Recover box from error state using specified recovery type
      operationId: Recover
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Recovery parameters
          in: body
          name: recovery
          required: true
          schema:
            $ref: '#/definitions/RecoverBoxDTO'
      produces:
        - application/json
      responses:
        '200':
          description: Box recovered
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Recover box from error state
      tags:
        - box
  /boxes/{boxId}/resize:
    post:
      description: Resize box
      operationId: Resize
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Resize box
          in: body
          name: box
          required: true
          schema:
            $ref: '#/definitions/ResizeBoxDTO'
      produces:
        - application/json
      responses:
        '200':
          description: Box resized
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Resize box
      tags:
        - box
  /boxes/{boxId}/start:
    post:
      description: Start box
      operationId: Start
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Metadata
          in: body
          name: metadata
          schema:
            type: object
        - description: Auth token
          in: query
          name: token
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Box started
          schema:
            $ref: '#/definitions/StartBoxResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Start box
      tags:
        - box
  /boxes/{boxId}/stop:
    post:
      description: Stop box
      operationId: Stop
      parameters:
        - description: Box ID
          in: path
          name: boxId
          required: true
          type: string
        - description: Stop box
          in: body
          name: box
          schema:
            $ref: '#/definitions/StopBoxDTO'
      produces:
        - application/json
      responses:
        '200':
          description: Box stopped
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Stop box
      tags:
        - box
  /info:
    get:
      description: Runner info with system metrics
      operationId: RunnerInfo
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/RunnerInfoResponseDTO'
      summary: Runner info
  /snapshots/build:
    post:
      description: Build a snapshot from a Dockerfile and context hashes. The operation
        runs asynchronously and returns 202 immediately.
      operationId: BuildSnapshot
      parameters:
        - description: Build snapshot request
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/BuildSnapshotRequestDTO'
      responses:
        '202':
          description: Snapshot build started
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Build a snapshot
      tags:
        - snapshots
  /snapshots/exists:
    get:
      description: Check if a specified snapshot exists locally
      operationId: SnapshotExists
      parameters:
        - description: Snapshot name and tag
          in: query
          name: snapshot
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/SnapshotExistsResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Check if a snapshot exists
      tags:
        - snapshots
  /snapshots/info:
    get:
      description: Get information about a specified snapshot including size and entrypoint.
        Returns 422 if the last pull/build operation failed, with the error reason
        in the message.
      operationId: GetSnapshotInfo
      parameters:
        - description: Snapshot name and tag
          in: query
          name: snapshot
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/SnapshotInfoResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '422':
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get snapshot information
      tags:
        - snapshots
  /snapshots/inspect:
    post:
      description: Inspect a specified snapshot in a registry
      operationId: InspectSnapshotInRegistry
      parameters:
        - description: Inspect snapshot in registry request
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/InspectSnapshotInRegistryRequest'
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/SnapshotDigestResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Inspect a snapshot in a registry
      tags:
        - snapshots
  /snapshots/logs:
    get:
      description: Stream build logs
      operationId: GetBuildLogs
      parameters:
        - description: Snapshot ref
          in: query
          name: snapshotRef
          required: true
          type: string
        - description: Whether to follow the log output
          in: query
          name: follow
          type: boolean
      responses:
        '200':
          description: Build logs stream
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get build logs
      tags:
        - snapshots
  /snapshots/pull:
    post:
      description: Pull a snapshot from a registry and optionally push to another
        registry. The operation runs asynchronously and returns 202 immediately.
      operationId: PullSnapshot
      parameters:
        - description: Pull snapshot
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/PullSnapshotRequestDTO'
      responses:
        '202':
