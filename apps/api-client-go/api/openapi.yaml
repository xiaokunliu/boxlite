components:
  schemas:
    Announcement:
      properties:
        text:
          description: The announcement text
          example: New feature available!
          type: string
        learnMoreUrl:
          description: URL to learn more about the announcement
          example: https://example.com/learn-more
          type: string
      required:
      - text
      type: object
    PosthogConfig:
      properties:
        apiKey:
          description: PostHog API key
          example: phc_abc123
          type: string
        host:
          description: PostHog host URL
          example: https://app.posthog.com
          type: string
      required:
      - apiKey
      - host
      type: object
    OidcConfig:
      properties:
        issuer:
          description: OIDC issuer
          example: https://auth.example.com
          type: string
        clientId:
          description: OIDC client ID
          example: boxlite-client
          type: string
        audience:
          description: OIDC audience
          example: boxlite-api
          type: string
        endSessionEndpoint:
          description: OIDC end-session endpoint. Set when the IdP does not advertise
            one via discovery (e.g. Dex) and BoxLite hosts a compatible logout endpoint.
          example: https://api.example.com/api/auth/end-session
          type: string
      required:
      - audience
      - clientId
      - issuer
      type: object
    RateLimitEntry:
      properties:
        ttl:
          description: Rate limit TTL in seconds
          example: 60
          type: number
        limit:
          description: Rate limit max requests
          example: 100
          type: number
      type: object
    RateLimitConfig:
      properties:
        failedAuth:
          allOf:
          - $ref: "#/components/schemas/RateLimitEntry"
          description: Failed authentication rate limit
        authenticated:
          allOf:
          - $ref: "#/components/schemas/RateLimitEntry"
          description: Authenticated rate limit
        boxCreate:
          allOf:
          - $ref: "#/components/schemas/RateLimitEntry"
          description: Box create rate limit
        boxLifecycle:
          allOf:
          - $ref: "#/components/schemas/RateLimitEntry"
          description: Box lifecycle rate limit
      type: object
    BoxliteConfiguration:
      example:
        version: 0.0.1
        posthog: ""
        oidc: ""
        linkedAccountsEnabled: true
        announcements:
          feature-update:
            text: New feature available!
            learnMoreUrl: https://example.com
        pylonAppId: pylon-app-123
        proxyTemplateUrl: "https://{{PORT}}-{{boxId}}.proxy.example.com"
        proxyToolboxUrl: https://proxy.example.com/toolbox
        dashboardUrl: https://dashboard.example.com
        maintananceMode: false
        environment: production
        billingApiUrl: https://billing.example.com
        analyticsApiUrl: https://analytics.example.com
        sshGatewayCommand: "ssh -p 2222 {{TOKEN}}@localhost"
        sshGatewayPublicKey: ssh-gateway-public-key
        rateLimit: ""
      properties:
        version:
          description: BoxLite version
          example: 0.0.1
          type: string
        posthog:
          allOf:
          - $ref: "#/components/schemas/PosthogConfig"
          description: PostHog configuration
        oidc:
          allOf:
          - $ref: "#/components/schemas/OidcConfig"
          description: OIDC configuration
        linkedAccountsEnabled:
          description: Whether linked accounts are enabled
          example: true
          type: boolean
        announcements:
          additionalProperties:
            $ref: "#/components/schemas/Announcement"
          description: System announcements
          example:
            feature-update:
              text: New feature available!
              learnMoreUrl: https://example.com
          type: object
        pylonAppId:
          description: Pylon application ID
          example: pylon-app-123
          type: string
        proxyTemplateUrl:
          description: Proxy template URL
          example: "https://{{PORT}}-{{boxId}}.proxy.example.com"
          type: string
        proxyToolboxUrl:
          description: Toolbox template URL
          example: https://proxy.example.com/toolbox
          type: string
        dashboardUrl:
          description: Dashboard URL
          example: https://dashboard.example.com
          type: string
        maintananceMode:
          description: Whether maintenance mode is enabled
          example: false
          type: boolean
        environment:
          description: Current environment
          example: production
          type: string
        billingApiUrl:
          description: Billing API URL
          example: https://billing.example.com
          type: string
        analyticsApiUrl:
          description: Analytics API URL
          example: https://analytics.example.com
          type: string
        sshGatewayCommand:
          description: SSH Gateway command
          example: "ssh -p 2222 {{TOKEN}}@localhost"
          type: string
        sshGatewayPublicKey:
          description: Base64 encoded SSH Gateway public key
          example: ssh-gateway-public-key
          type: string
        rateLimit:
          allOf:
          - $ref: "#/components/schemas/RateLimitConfig"
          description: Rate limit configuration
      required:
      - announcements
      - dashboardUrl
      - environment
      - linkedAccountsEnabled
      - maintananceMode
      - oidc
      - proxyTemplateUrl
      - proxyToolboxUrl
      - version
      type: object
    CreateApiKey:
      example:
        name: My API Key
        permissions:
        - write:registries
        - write:registries
        expiresAt: 2025-06-09T12:00:00Z
      properties:
        name:
          description: The name of the API key
          example: My API Key
          type: string
        permissions:
          description: The list of organization resource permissions explicitly assigned
            to the API key
          items:
            enum:
            - write:registries
            - delete:registries
            - write:templates
            - delete:templates
            - write:boxes
            - delete:boxes
            - read:volumes
            - write:volumes
            - delete:volumes
            - write:regions
            - delete:regions
            - read:runners
            - write:runners
            - delete:runners
            - read:audit_logs
            type: string
          type: array
        expiresAt:
          description: When the API key expires
          example: 2025-06-09T12:00:00Z
          format: date-time
          nullable: true
          type: string
      required:
      - name
      - permissions
      type: object
    ApiKeyResponse:
      example:
        name: My API Key
        value: bb_sk_1234567890abcdef
        createdAt: 2024-03-14T12:00:00Z
        permissions:
        - write:registries
        - write:registries
        expiresAt: 2025-06-09T12:00:00Z
      properties:
        name:
          description: The name of the API key
          example: My API Key
          type: string
        value:
          description: The API key value
          example: bb_sk_1234567890abcdef
          type: string
        createdAt:
          description: When the API key was created
          example: 2024-03-14T12:00:00Z
          format: date-time
          type: string
        permissions:
          description: The list of organization resource permissions assigned to the
            API key
          items:
            enum:
            - write:registries
            - delete:registries
            - write:templates
            - delete:templates
            - write:boxes
            - delete:boxes
            - read:volumes
            - write:volumes
            - delete:volumes
            - write:regions
            - delete:regions
            - read:runners
            - write:runners
            - delete:runners
            - read:audit_logs
            type: string
          type: array
        expiresAt:
          description: When the API key expires
          example: 2025-06-09T12:00:00Z
          format: date-time
          nullable: true
          type: string
      required:
      - createdAt
      - expiresAt
      - name
      - permissions
      - value
      type: object
    ApiKeyList:
      example:
        name: My API Key
        value: bb_********************def
        createdAt: 2024-03-14T12:00:00Z
        permissions:
        - write:registries
        - write:registries
        lastUsedAt: 2024-03-14T12:00:00Z
        expiresAt: 2024-03-14T12:00:00Z
        userId: "123"
      properties:
        name:
          description: The name of the API key
          example: My API Key
          type: string
        value:
          description: The masked API key value
          example: bb_********************def
          type: string
        createdAt:
          description: When the API key was created
          example: 2024-03-14T12:00:00Z
          format: date-time
          type: string
        permissions:
          description: The list of organization resource permissions assigned to the
            API key
          items:
            enum:
            - write:registries
            - delete:registries
            - write:templates
            - delete:templates
            - write:boxes
            - delete:boxes
            - read:volumes
            - write:volumes
            - delete:volumes
            - write:regions
            - delete:regions
            - read:runners
            - write:runners
            - delete:runners
            - read:audit_logs
            type: string
          type: array
        lastUsedAt:
          description: When the API key was last used
          example: 2024-03-14T12:00:00Z
          format: date-time
          nullable: true
          type: string
        expiresAt:
          description: When the API key expires
          example: 2024-03-14T12:00:00Z
          format: date-time
          nullable: true
          type: string
        userId:
          description: The user ID of the user who created the API key
